name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# precisa escrever na branch gh-pages
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (export estático)
        run: npm run build
        env:
          # basePath = nome do repositório, para o site funcionar em /<repo>/
          PAGES_BASE_PATH: ${{ github.event.repository.name }}
      - name: Publicar em gh-pages
        run: |
          touch out/.nojekyll
          cd out
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "deploy ${{ github.sha }}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
